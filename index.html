<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
    <title>AccounTech Pro - Conectado</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
          theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] }, colors: { primary: '#2563eb', success: '#16a34a', danger: '#dc2626', dark: '#0f172a' } } }
        }
    </script>
    <style>
        body { background-color: #f8fafc; -webkit-tap-highlight-color: transparent; scroll-behavior: smooth; user-select: none; }
        .view-section { display: none; opacity: 0; transition: opacity 0.2s ease-in; }
        .view-section.active { display: block; opacity: 1; }
        .active-btn { border-color: #2563eb !important; background-color: #eff6ff !important; color: #2563eb !important; border-width: 2px !important; }
        ::-webkit-scrollbar { display: none; }
        input, select { font-size: 16px !important; outline: none !important; } 
        input:focus { border-color: #2563eb !important; ring: 0 !important; }
        .drawer { transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1); transform: translateY(110%); max-height: 92vh; display: flex; flex-direction: column; }
        .drawer.active { transform: translateY(0); }
        .drawer-content { overflow-y: auto; flex: 1; padding-bottom: 40px; -webkit-overflow-scrolling: touch; }
        .overlay { transition: opacity 0.3s ease; opacity: 0; pointer-events: none; backdrop-filter: blur(4px); }
        .overlay.active { opacity: 1; pointer-events: auto; }
        .acc-content { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out; }
        .acc-card.open .acc-content { max-height: 1000px; }
        .acc-card.open .chevron-icon { transform: rotate(180deg); }
        .chevron-icon { transition: transform 0.3s ease; }
        .custom-select-btn { border: 1px solid #e2e8f0; border-radius: 1rem; padding: 1rem 1.25rem; width: 100%; display: flex; justify-content: space-between; align-items: center; background: white; font-weight: 800; text-transform: uppercase; font-size: 0.75rem; height: 3.5rem; transition: all 0.2s; }
        .custom-select-btn.filled { border-color: #2563eb; color: #2563eb; background-color: #eff6ff; }
        .fab { position: fixed; bottom: 110px; right: 20px; z-index: 40; width: 56px; height: 56px; border-radius: 18px; background-color: #0f172a; color: white; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 25px -5px rgba(15, 23, 42, 0.5); border: none; transition: transform 0.2s; }
        .fab:active { transform: scale(0.90); }
        #toast-container { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 200; display: flex; flex-direction: column; gap: 10px; pointer-events: none; width: 90%; max-width: 400px; }
        .toast { background: rgba(15, 23, 42, 0.95); color: white; padding: 12px 20px; border-radius: 50px; font-size: 12px; font-weight: 700; text-transform: uppercase; text-align: center; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); opacity: 0; transform: translateY(-20px); transition: all 0.3s; pointer-events: auto; backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; gap: 8px; }
        .toast.show { opacity: 1; transform: translateY(0); }
        .toast.error { background: rgba(220, 38, 38, 0.95); }
        .toast.success { background: rgba(22, 163, 74, 0.95); }
        .sync-status { position: fixed; top: 15px; right: 15px; background: white; padding: 6px 12px; border-radius: 20px; font-size: 10px; font-weight: 800; color: #64748b; z-index: 60; display: flex; align-items: center; gap: 6px; box-shadow: 0 4px 10px -2px rgba(0,0,0,0.05); transition: all 0.3s; opacity: 0; pointer-events: none; }
        .sync-status.visible { opacity: 1; transform: translateY(0); }
        .sync-dot { width: 8px; height: 8px; background-color: #cbd5e1; border-radius: 50%; }
        .sync-dot.online { background-color: #16a34a; box-shadow: 0 0 8px #16a34a; }
        .sync-dot.working { background-color: #eab308; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body class="font-sans text-slate-900 pb-32 selection:bg-primary selection:text-white">

<!-- UI Elements -->
<div id="toast-container"></div>
<div id="modalOverlay" class="overlay fixed inset-0 z-[100] bg-slate-900/60" onclick="App.closeAll()"></div>
<div id="sync-ui" class="sync-status"><div id="sync-dot" class="sync-dot"></div><span id="sync-text">Desconectado</span></div>

<!-- FORMULARIO STOCK -->
<div id="drawerInvForm" class="drawer fixed bottom-0 left-0 right-0 z-[101] bg-white rounded-t-[2.5rem] shadow-2xl">
    <div class="w-full pt-4 pb-2" onclick="App.closeAll()"><div class="w-12 h-1.5 bg-slate-200 rounded-full mx-auto"></div></div>
    <div class="px-8 pb-4 flex justify-between items-center">
        <h3 class="font-black text-xl uppercase tracking-tight text-slate-800" id="inv-form-title">Stock</h3>
        <button onclick="App.closeAll()" class="p-2 bg-slate-100 rounded-full text-slate-400"><i data-lucide="x" class="w-5 h-5"></i></button>
    </div>
    <div class="drawer-content px-8 space-y-4 pt-2">
        <input type="hidden" id="editId">
        <input type="text" id="pNombre" list="catsListInv" placeholder="NOMBRE CATEGORÍA" class="w-full rounded-2xl border-slate-100 bg-slate-50 h-14 uppercase font-black px-5 focus:bg-white transition-colors">
        <datalist id="catsListInv"></datalist>
        <input type="text" id="pSubNombre" placeholder="VARIANTE / MODELO" class="w-full rounded-2xl border-slate-100 bg-slate-50 h-14 uppercase font-black px-5 focus:bg-white transition-colors">
        <div class="grid grid-cols-2 gap-4">
            <div><label class="text-[9px] font-black ml-2 text-slate-400 uppercase">Cantidad</label><input type="tel" id="pStock" placeholder="0" class="w-full rounded-2xl border-slate-100 bg-slate-50 h-14 text-center font-black text-lg" oninput="Utils.formatInput(this)"></div>
            <div><label class="text-[9px] font-black ml-2 text-slate-400 uppercase">Precio</label><input type="tel" id="pPrecio" placeholder="$0" class="w-full rounded-2xl border-slate-100 bg-slate-50 h-14 text-center font-black text-lg text-primary" oninput="Utils.formatInput(this)"></div>
        </div>
        <button onclick="Inventory.save()" class="w-full bg-slate-900 text-white py-5 rounded-[1.5rem] font-black uppercase text-xs tracking-widest mt-4">Guardar Registro</button>
    </div>
</div>

<!-- MODAL ABONO -->
<div id="modalAbono" class="drawer fixed bottom-0 left-0 right-0 z-[101] bg-white rounded-t-[2.5rem] p-8 shadow-2xl">
    <div class="w-12 h-1.5 bg-slate-200 rounded-full mx-auto mb-6"></div>
    <h3 class="font-black text-xl text-center uppercase tracking-tight mb-1">Registrar Pago</h3>
    <p id="modalNombre" class="font-black text-primary uppercase text-center text-sm mb-6"></p>
    <div class="space-y-6 text-center">
        <div class="relative"><span class="absolute left-1/2 -translate-x-[200%] top-1/2 -translate-y-1/2 text-slate-300 font-black text-3xl">$</span><input type="tel" id="modalMonto" placeholder="0" class="w-full border-none bg-transparent h-20 text-center font-black text-6xl focus:ring-0 text-slate-800" oninput="Utils.formatInput(this)"></div>
        <p id="modalSaldo" class="text-xs font-bold text-danger uppercase bg-red-50 py-2 px-4 rounded-full inline-block"></p>
        <div class="grid grid-cols-2 gap-3">
            <button onclick="Finance.setMethod('efectivo')" id="m-efectivo" class="py-4 rounded-2xl border-2 border-slate-100 font-black text-[10px] uppercase">Efectivo</button>
            <button onclick="Finance.setMethod('tarjeta')" id="m-tarjeta" class="py-4 rounded-2xl border-2 border-slate-100 font-black text-[10px] uppercase">Tarjeta</button>
        </div>
        <button onclick="Finance.confirmPayment()" class="w-full bg-success text-white py-5 rounded-[2rem] font-black uppercase tracking-widest shadow-xl">Confirmar Pago</button>
    </div>
</div>

<!-- DRAWER CLIENTES -->
<div id="drawerClientes" class="drawer fixed bottom-0 left-0 right-0 z-[101] bg-white rounded-t-[2.5rem] p-6 shadow-2xl">
    <div class="w-full pt-2 pb-4"><div class="w-12 h-1.5 bg-slate-200 rounded-full mx-auto"></div></div>
    <div class="relative mb-4"><i data-lucide="search" class="absolute left-5 top-4 w-5 h-5 text-slate-300"></i><input type="text" id="searchCliente" placeholder="Buscar Cliente..." class="w-full rounded-2xl border-slate-100 bg-slate-50 h-14 font-bold pl-12 pr-5 uppercase text-sm" oninput="Clients.filter()"></div>
    <div id="listaClientesDrawer" class="space-y-2 overflow-y-auto max-h-[60vh]"></div>
    <button onclick="Clients.createManual()" class="w-full mt-4 p-4 border-2 border-dashed border-slate-200 rounded-2xl text-slate-400 font-black uppercase text-[10px] tracking-widest hover:border-primary hover:text-primary">+ Crear Nuevo Cliente</button>
</div>

<!-- DRAWER PRODUCTOS -->
<div id="drawerProductos" class="drawer fixed bottom-0 left-0 right-0 z-[101] bg-white rounded-t-[2.5rem] p-6 shadow-2xl">
    <div class="w-full pt-2 pb-4"><div class="w-12 h-1.5 bg-slate-200 rounded-full mx-auto"></div></div>
    <div class="flex justify-between items-center mb-4 px-2"><h3 class="font-black text-lg uppercase tracking-tight" id="drawerProductTitle">Seleccionar</h3><button onclick="if(Sales.state.catSel && !Sales.state.subSelId) Sales.resetSelection(); else App.closeAll()" class="text-xs font-bold text-slate-400 uppercase">Atrás</button></div>
    <div id="listaProductosDrawer" class="space-y-2 overflow-y-auto max-h-[60vh]"></div>
</div>

<!-- HEADER -->
<header class="bg-white/90 backdrop-blur-md px-6 py-5 sticky top-0 z-50 border-b border-slate-100 text-center">
    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em] mb-1">CarlosPN Interactive®</p>
    <h1 class="text-xl font-black text-slate-900 uppercase tracking-tighter" id="headerTitle">Resumen</h1>
</header>

<!-- MAIN CONTENT -->
<main class="px-4 mt-6 space-y-8 pb-10 min-h-screen">
    <!-- VIEW HOME -->
    <section id="view-home" class="view-section active space-y-8">
        <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100 text-center relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-primary to-cyan-400"></div>
            <p class="text-[10px] font-black text-slate-400 uppercase mb-2 tracking-widest">Caja Total Hoy</p>
            <h2 class="text-5xl font-black text-slate-900 tracking-tight" id="stat-ganancia">$0</h2>
            <div class="flex gap-4 mt-6 pt-5 border-t border-slate-50 text-[10px] font-black uppercase text-slate-500">
                <div class="flex-1 flex flex-col items-center"><span class="mb-1 text-slate-300">Efectivo</span><span class="text-success text-base" id="stat-efectivo">$0</span></div>
                <div class="flex-1 flex flex-col items-center border-l border-slate-50"><span class="mb-1 text-slate-300">Tarjeta</span><span class="text-primary text-base" id="stat-tarjeta">$0</span></div>
            </div>
        </div>
        <div class="space-y-4"><h3 class="font-black text-slate-800 px-2 uppercase text-[10px] flex justify-between tracking-widest items-center"><span>⚠️ CUENTAS PENDIENTES</span><span class="bg-red-50 text-danger px-2 py-1 rounded-md" id="stat-deuda">$0</span></h3><div id="list-deudores" class="space-y-4"></div></div>
        <div class="space-y-4"><h3 class="font-black text-slate-800 px-2 uppercase text-[10px] tracking-widest text-center">📜 MOVIMIENTOS RECIENTES</h3><div id="list-ventas" class="space-y-3"></div></div>
    </section>
    
    <!-- VIEW INVENTORY -->
    <section id="view-inventory" class="view-section space-y-6">
        <div class="grid grid-cols-2 gap-3 text-center">
            <div class="bg-slate-900 p-5 rounded-3xl text-white shadow-lg"><p class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1">Valor Stock</p><h4 class="text-lg font-black" id="inv-total-valor">$0</h4></div>
            <div class="bg-white p-5 rounded-3xl border border-slate-100 shadow-sm"><p class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1">Unidades</p><h4 class="text-lg font-black" id="inv-total-unidades">0</h4></div>
        </div>
        <div class="relative"><i data-lucide="search" class="absolute left-5 top-4 w-5 h-5 text-slate-300"></i><input type="text" id="invSearch" placeholder="Buscar producto..." class="w-full rounded-2xl border-none bg-white h-14 font-bold shadow-sm pl-12 pr-5 text-sm" oninput="Inventory.render()"></div>
        <div id="tabla-inventario" class="space-y-4 pb-20"></div>
        <button onclick="Inventory.openForm()" class="fab shadow-xl"><i data-lucide="plus" class="w-8 h-8"></i></button>
    </section>

    <!-- VIEW CLIENTS -->
    <section id="view-clients" class="view-section space-y-6">
        <div class="relative"><i data-lucide="search" class="absolute left-5 top-4 w-5 h-5 text-slate-300"></i><input type="text" id="clientSearch" placeholder="Buscar en historial..." class="w-full rounded-2xl border-none bg-white h-14 font-bold shadow-sm pl-12 pr-5 text-sm" oninput="Clients.renderBase()"></div>
        <div id="lista-base-clientes" class="space-y-4 pb-20"></div>
    </section>

    <!-- VIEW SALES -->
    <section id="view-sales" class="view-section space-y-6">
        <div class="bg-white p-6 rounded-[2.5rem] border border-slate-100 shadow-sm relative">
            <div class="absolute -top-3 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-4 py-1 rounded-full text-[10px] font-black uppercase tracking-widest">Nueva Venta</div>
            <div class="space-y-6 mt-4">
                <div class="grid grid-cols-3 gap-2 bg-slate-50 p-1.5 rounded-2xl border border-slate-100">
                    <button onclick="Sales.setMode('efectivo')" id="btn-efectivo" class="py-3 rounded-xl text-[9px] font-black uppercase active-btn transition-all">EFECTIVO</button>
                    <button onclick="Sales.setMode('tarjeta')" id="btn-tarjeta" class="py-3 rounded-xl text-[9px] font-black uppercase transition-all">TARJETA</button>
                    <button onclick="Sales.setMode('credito')" id="btn-credito" class="py-3 rounded-xl text-[9px] font-black uppercase text-danger transition-all">DEUDA</button>
                </div>
                <div class="space-y-4">
                    <button onclick="Sales.openClientDrawer()" id="btnSelectCliente" class="custom-select-btn shadow-sm group"><span class="text-slate-400 group-[.filled]:text-primary">SELECCIONAR CLIENTE</span> <i data-lucide="user" class="w-4 h-4 opacity-30"></i></button>
                    <div class="grid grid-cols-1 gap-3 transition-all" id="date-container">
                        <div class="relative"><span class="absolute left-4 top-1/2 -translate-y-1/2 text-[9px] font-black text-slate-400">FECHA</span><input type="date" id="dVentaFecha" class="w-full rounded-2xl border-slate-100 bg-slate-50 h-14 text-xs font-black pl-16 pr-5 text-right outline-none"></div>
                        <div class="relative hidden" id="divFechaFin"><span class="absolute left-4 top-1/2 -translate-y-1/2 text-[9px] font-black text-red-300">COBRO</span><input type="date" id="dFechaFin" class="w-full rounded-2xl border-red-100 bg-red-50 h-14 text-xs font-black text-danger pl-16 pr-5 text-right outline-none"></div>
                    </div>
                    <div class="flex gap-2"><button onclick="Sales.openCatDrawer()" id="btnSelectCat" class="custom-select-btn shadow-sm flex-1"><span class="truncate">CATEGORÍA</span></button><button onclick="Sales.openSubCatDrawer()" id="btnSelectSubCat" class="custom-select-btn shadow-sm flex-1"><span class="truncate">VARIANTE</span></button></div>
                    <div class="text-center bg-slate-50 rounded-3xl py-4 border border-dashed border-slate-200">
                        <label class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Cantidad</label>
                        <div class="flex items-center justify-center gap-4 mt-2">
                             <button onclick="Sales.adjustQty(-1)" class="w-10 h-10 rounded-full bg-white shadow-sm flex items-center justify-center text-slate-400 active:scale-90 transition-transform"><i data-lucide="minus" class="w-4 h-4"></i></button>
                             <input type="tel" id="dCantidad" value="1" class="w-24 border-none bg-transparent text-center font-black text-5xl p-0 focus:ring-0" oninput="Utils.formatInput(this)">
                             <button onclick="Sales.adjustQty(1)" class="w-10 h-10 rounded-full bg-white shadow-sm flex items-center justify-center text-primary active:scale-90 transition-transform"><i data-lucide="plus" class="w-4 h-4"></i></button>
                        </div>
                    </div>
                </div>
                <button onclick="Sales.process()" class="w-full bg-slate-900 text-white py-6 rounded-[2rem] font-black uppercase tracking-widest shadow-xl shadow-slate-300 active:scale-[0.98] transition-transform">Finalizar Venta</button>
            </div>
        </div>
    </section>

    <!-- FOOTER SIGNATURE -->
    <footer class="text-center py-8 opacity-40">
        <p class="text-[10px] font-black uppercase tracking-widest text-slate-400">CarlosPN Interactive® — 2026</p>
        <p class="text-[8px] font-bold uppercase tracking-wide text-slate-300 mt-1">Sistema Profesional de Gestión</p>
    </footer>
</main>

<nav class="fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-lg border-t border-slate-100 px-6 py-5 flex justify-between items-center z-50 rounded-t-[2.5rem] shadow-[0_-10px_40px_-15px_rgba(0,0,0,0.1)]">
    <button onclick="App.switchView('view-home')" class="nav-item flex flex-col items-center space-y-1.5 text-primary transition-colors" id="nav-home"><i data-lucide="layout-grid" class="w-6 h-6"></i><span class="text-[9px] font-black uppercase tracking-wide">Inicio</span></button>
    <button onclick="App.switchView('view-inventory')" class="nav-item flex flex-col items-center space-y-1.5 text-slate-300 hover:text-slate-500 transition-colors" id="nav-inventory"><i data-lucide="box" class="w-6 h-6"></i><span class="text-[9px] font-black uppercase tracking-wide">Stock</span></button>
    <button onclick="App.switchView('view-clients')" class="nav-item flex flex-col items-center space-y-1.5 text-slate-300 hover:text-slate-500 transition-colors" id="nav-clients"><i data-lucide="users" class="w-6 h-6"></i><span class="text-[9px] font-black uppercase tracking-wide">Clientes</span></button>
    <button onclick="App.switchView('view-sales')" class="nav-item flex flex-col items-center space-y-1.5 text-slate-300 hover:text-slate-500 transition-colors" id="nav-sales"><i data-lucide="plus-circle" class="w-6 h-6"></i><span class="text-[9px] font-black uppercase tracking-wide">Vender</span></button>
</nav>

<script>
    /**
     * CONFIGURACIÓN: PEGA AQUÍ TU URL DE GOOGLE SCRIPT
     * Ejemplo: "https://script.google.com/macros/s/AKfycbx.../exec"
     */
    const API_URL = "https://script.google.com/macros/s/AKfycbyDwAXA7wL_FE2ZxKOaRE2ztLzcups8jB6XNHHOw5XUMZPK65SaKYYuelqNjmv1T70/exec";

    const Utils = {
        pNum: (s) => parseInt(s.toString().replace(/\./g, '')) || 0,
        fNum: (n) => new Intl.NumberFormat('de-DE').format(n),
        fDate: (iso) => { if(!iso) return ''; const [y, m, d] = iso.split('-'); return `${d}/${m}/${y}`; },
        todayISO: () => new Date().toLocaleDateString('en-CA'),
        formatInput: (input) => { let val = input.value.replace(/\D/g, ""); if (val === "") { input.value = ""; return; } input.value = new Intl.NumberFormat('de-DE').format(parseInt(val)); },
        debounce: (func, wait) => { let timeout; return function executedFunction(...args) { const later = () => { clearTimeout(timeout); func(...args); }; clearTimeout(timeout); timeout = setTimeout(later, wait); }; },
        toast: (msg, type = 'default') => { const c = document.getElementById('toast-container'); const el = document.createElement('div'); el.className = `toast ${type}`; let icon = type === 'success' ? 'check-circle' : (type === 'error' ? 'alert-circle' : 'info'); el.innerHTML = `<i data-lucide="${icon}" class="w-4 h-4"></i> <span>${msg}</span>`; c.appendChild(el); lucide.createIcons(); requestAnimationFrame(() => el.classList.add('show')); setTimeout(() => { el.classList.remove('show'); setTimeout(() => el.remove(), 300); }, 3000); }
    };

    const Store = {
        data: { inv: [], deu: [], hist: [], caja: { ef: 0, tj: 0 }, clients: [] },
        init: () => {
            if(!API_URL || API_URL.includes("PEGAR_AQUI")) {
                Utils.toast("¡ERROR! Falta configurar la URL en el código HTML", "error");
                Store.uiStatus('error');
            } else {
                Store.fetchData();
            }
        },
        uiStatus: (status) => {
            const ui = document.getElementById('sync-ui'), dot = document.getElementById('sync-dot'), txt = document.getElementById('sync-text');
            ui.classList.add('visible');
            if(status === 'working') { dot.className = 'sync-dot working'; txt.innerText = 'Sincronizando...'; }
            else if(status === 'online') { dot.className = 'sync-dot online'; txt.innerText = 'Conectado'; setTimeout(() => ui.classList.remove('visible'), 2000); }
            else { dot.className = 'sync-dot bg-red-500'; txt.innerText = 'Error Conexión'; }
        },
        fetchData: async () => {
            Store.uiStatus('working');
            try {
                const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'LOAD' }) });
                const json = await res.json();
                if(json.inv) {
                    Store.data = json;
                    App.renderDashboard();
                    Store.uiStatus('online');
                    Sales.init();
                    Utils.toast("Datos cargados correctamente", "success");
                }
            } catch (e) {
                console.error(e);
                Store.uiStatus('error');
                Utils.toast("Error al conectar con Google Sheets", "error");
            }
        },
        save: async () => {
            Store.uiStatus('working');
            try {
                await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'SYNC', data: Store.data }) });
                Store.uiStatus('online');
                App.renderDashboard();
            } catch (e) {
                Store.uiStatus('error');
                Utils.toast("Error al guardar en Nube", "error");
            }
        }
    };

    // LOGICA NEGOCIO
    const Inventory = {
        render: Utils.debounce(() => {
            const q = document.getElementById('invSearch').value.toUpperCase();
            const list = document.getElementById('tabla-inventario');
            const grouped = Store.data.inv.reduce((acc, p) => { if (!acc[p.cat]) acc[p.cat] = []; acc[p.cat].push(p); return acc; }, {});
            let html = Object.keys(grouped).map(cat => {
                const items = grouped[cat].filter(p => p.sub.includes(q) || cat.includes(q));
                if (items.length === 0) return '';
                const isOpen = q.length > 0 ? 'open' : '';
                return `<div class="acc-card bg-white rounded-[2rem] border border-slate-100 shadow-sm overflow-hidden mb-3 ${isOpen}"><div class="p-5 flex justify-between items-center cursor-pointer active:bg-slate-50" onclick="this.closest('.acc-card').classList.toggle('open')"><div><h4 class="font-black text-xs uppercase text-slate-800">${cat}</h4><p class="text-[9px] font-bold text-slate-400 uppercase mt-0.5">${items.length} variantes</p></div><div class="chevron-icon text-slate-300"><i data-lucide="chevron-down" class="w-5 h-5"></i></div></div><div class="acc-content border-t border-slate-50 bg-slate-50/30"><div class="divide-y divide-slate-100">${items.map(p => `<div class="p-4 flex justify-between items-center pl-6"><div><p class="font-bold text-[10px] uppercase text-slate-700">${p.sub}</p><p class="text-[9px] font-black uppercase mt-1 ${p.s < 3 ? 'text-danger' : 'text-slate-400'}">Stock: ${Utils.fNum(p.s)}</p></div><div class="flex items-center gap-3"><span class="text-xs font-black text-primary bg-blue-50 px-2 py-1 rounded-lg">$${Utils.fNum(p.p)}</span><button onclick="Inventory.edit(${p.id})" class="text-slate-400 hover:text-primary"><i data-lucide="edit-3" class="w-4 h-4"></i></button><button onclick="Inventory.delete(${p.id})" class="text-slate-300 hover:text-danger"><i data-lucide="trash-2" class="w-4 h-4"></i></button></div></div>`).join('')}</div></div></div>`;
            }).join('');
            list.innerHTML = html || '<div class="text-center mt-10 opacity-40"><i data-lucide="box" class="w-12 h-12 mx-auto mb-2 text-slate-300"></i><p class="text-xs font-bold uppercase">Sin resultados</p></div>';
            document.getElementById('inv-total-valor').innerText = '$' + Utils.fNum(Store.data.inv.reduce((a,b) => a + (b.s * b.p), 0));
            document.getElementById('inv-total-unidades').innerText = Utils.fNum(Store.data.inv.reduce((a,b) => a + b.s, 0));
            lucide.createIcons();
        }, 150),
        openForm: () => { document.getElementById('editId').value = ''; document.getElementById('pNombre').value = ''; document.getElementById('pSubNombre').value = ''; document.getElementById('pStock').value = ''; document.getElementById('pPrecio').value = ''; document.getElementById('inv-form-title').innerText = "Nuevo Item"; const cats = [...new Set(Store.data.inv.map(p => p.cat))].sort(); document.getElementById('catsListInv').innerHTML = cats.map(c => `<option value="${c}">`).join(''); App.openDrawer('drawerInvForm'); },
        edit: (id) => { const p = Store.data.inv.find(x => x.id == id); if(!p) return; document.getElementById('editId').value = p.id; document.getElementById('pNombre').value = p.cat; document.getElementById('pSubNombre').value = p.sub; document.getElementById('pStock').value = Utils.fNum(p.s); document.getElementById('pPrecio').value = Utils.fNum(p.p); document.getElementById('inv-form-title').innerText = "Editar Item"; App.openDrawer('drawerInvForm'); },
        save: () => { const id = document.getElementById('editId').value, cat = document.getElementById('pNombre').value.trim().toUpperCase(), sub = document.getElementById('pSubNombre').value.trim().toUpperCase(), s = Utils.pNum(document.getElementById('pStock').value), p = Utils.pNum(document.getElementById('pPrecio').value); if(!cat || !sub) return Utils.toast("Faltan datos", "error"); if(id) { const idx = Store.data.inv.findIndex(x => x.id == id); if(idx > -1) Store.data.inv[idx] = { id: parseInt(id), cat, sub, s, p }; } else { Store.data.inv.push({ id: Date.now(), cat, sub, s, p }); } Store.save(); Inventory.render(); App.closeAll(); Utils.toast("Guardado", "success"); },
        delete: (id) => { if(confirm('¿Eliminar de la base de datos?')) { Store.data.inv = Store.data.inv.filter(x => x.id !== id); Store.save(); Inventory.render(); Utils.toast("Eliminado", "success"); } }
    };

    const Finance = {
        method: 'efectivo', clientName: '',
        renderDebts: () => {
            const gDeu = Store.data.deu.reduce((acc, d) => { if (!acc[d.cli]) acc[d.cli] = { items: [], saldo: 0 }; const p = d.tot - d.abono; if(p > 0) { acc[d.cli].items.push(d); acc[d.cli].saldo += p; } return acc; }, {});
            const names = Object.keys(gDeu).filter(n => gDeu[n].saldo > 0);
            if (names.length === 0) { document.getElementById('stat-deuda').innerText = '$0'; document.getElementById('list-deudores').innerHTML = '<div class="text-center py-8 bg-white rounded-[2rem] border border-slate-100 border-dashed"><p class="font-black text-[10px] uppercase opacity-40">Sin deudas</p></div>'; return; }
            document.getElementById('stat-deuda').innerText = '$' + Utils.fNum(names.reduce((a, n) => a + gDeu[n].saldo, 0));
            document.getElementById('list-deudores').innerHTML = names.map(nom => { const d = gDeu[nom]; return `<div class="p-6 bg-white rounded-[2rem] border border-slate-100 shadow-sm"><div class="flex justify-between items-start mb-3"><p class="font-black text-sm uppercase text-slate-800">${nom}</p><p class="font-black text-lg text-danger">$${Utils.fNum(d.saldo)}</p></div><div class="bg-slate-50 p-3 rounded-xl mb-4 space-y-1 border border-slate-100/50">${d.items.slice(0,3).map(i=>`<div class="flex justify-between text-[9px] text-slate-500"><span>• ${i.pr}</span><span>$${Utils.fNum(i.tot-i.abono)}</span></div>`).join('')}</div><button onclick="Finance.openPaymentModal('${nom}')" class="w-full bg-slate-900 text-white text-[10px] font-black py-4 rounded-xl uppercase tracking-widest active:scale-[0.98] transition-all">Registrar Abono</button></div>`; }).join(''); lucide.createIcons();
        },
        openPaymentModal: (nom) => { Finance.clientName = nom; const s = Store.data.deu.filter(d => d.cli === nom).reduce((a,b) => a + (b.tot - b.abono), 0); document.getElementById('modalNombre').innerText = nom; document.getElementById('modalSaldo').innerText = `Saldo: $${Utils.fNum(s)}`; document.getElementById('modalMonto').value = ''; Finance.setMethod('efectivo'); App.openDrawer('modalAbono'); setTimeout(() => document.getElementById('modalMonto').focus(), 100); },
        setMethod: (m) => { Finance.method = m; document.getElementById('m-efectivo').className = `py-4 rounded-2xl border-2 font-black text-[10px] uppercase transition-all ${m === 'efectivo' ? 'active-btn' : 'border-slate-100 text-slate-400'}`; document.getElementById('m-tarjeta').className = `py-4 rounded-2xl border-2 font-black text-[10px] uppercase transition-all ${m === 'tarjeta' ? 'active-btn' : 'border-slate-100 text-slate-400'}`; },
        confirmPayment: () => {
            const m = Utils.pNum(document.getElementById('modalMonto').value); if(m <= 0) return Utils.toast("Monto inválido", "error");
            let userDebts = Store.data.deu.filter(d => d.cli === Finance.clientName && (d.tot - d.abono) > 0).sort((a,b) => new Date(a.fv) - new Date(b.fv));
            let r = m, paid = [];
            for(let d of userDebts) { if(r <= 0) break; let p = d.tot - d.abono, pay = Math.min(r, p); d.abono += pay; r -= pay; paid.push(d.pr); }
            if(Finance.method === 'efectivo') Store.data.caja.ef += m; else Store.data.caja.tj += m;
            Store.data.hist.unshift({ cli: Finance.clientName, det: `Abono: ${paid.length > 1 ? 'Varios' : paid[0]}`, tot: m, fv: Utils.todayISO(), tipo: Finance.method, isPago: true });
            Store.save(); Utils.toast(`Pago registrado`, "success"); App.closeAll();
        }
    };

    const Clients = {
        renderBase: Utils.debounce(() => {
            const q = document.getElementById('clientSearch').value.toUpperCase(), list = document.getElementById('lista-base-clientes');
            const fil = Store.data.clients.filter(c => c.toUpperCase().includes(q)).sort();
            if(fil.length === 0) { list.innerHTML = '<div class="text-center mt-10 opacity-40"><i data-lucide="user-x" class="w-12 h-12 mx-auto mb-2 text-slate-300"></i><p class="text-xs font-bold uppercase">No encontrado</p></div>'; lucide.createIcons(); return; }
            list.innerHTML = fil.map(c => { 
                const d = Store.data.deu.filter(x => x.cli === c).reduce((a,b) => a + (b.tot - b.abono), 0); 
                return `<div class="acc-card bg-white rounded-[2rem] border border-slate-100 shadow-sm overflow-hidden" onclick="if(event.target.closest('button')) return; this.classList.toggle('open')">
                    <div class="p-5 flex justify-between items-center cursor-pointer">
                        <div><h4 class="font-black text-xs uppercase text-slate-900 flex items-center gap-2"><i data-lucide="user" class="w-3 h-3 text-slate-300"></i> ${c}</h4><p class="text-[9px] font-bold uppercase mt-1">${d > 0 ? `<span class="text-danger bg-red-50 px-2 py-0.5 rounded">Debe: $${Utils.fNum(d)}</span>` : `<span class="text-success">Al día</span>`}</p></div>
                        <div class="chevron-icon text-slate-300"><i data-lucide="chevron-down" class="w-4 h-4"></i></div>
                    </div>
                    <div class="acc-content border-t border-slate-50 bg-slate-50">
                        <div class="p-4 space-y-2 max-h-60 overflow-y-auto">
                            ${Store.data.hist.filter(h => h.cli === c).slice(0,10).map(h => `<div class="flex justify-between items-center text-[9px] font-bold p-3 bg-white rounded-xl border border-slate-100"><div class="flex-1"><span class="block text-[8px] text-slate-400 mb-0.5">${Utils.fDate(h.fv)} - ${h.isPago?'ABONO':'VENTA'}</span><span class="${h.isPago?'text-primary':'text-slate-700'} uppercase">${h.det}</span></div><span class="${h.isPago?'text-success':'text-slate-900'}">$${Utils.fNum(h.tot)}</span></div>`).join('') || '<p class="text-center text-[9px] text-slate-400">Sin historial</p>'}
                            <div class="pt-2 mt-2 border-t border-slate-200">
                                <button onclick="Clients.delete('${c}')" class="w-full py-3 bg-red-50 text-danger rounded-xl font-black text-[9px] uppercase tracking-widest flex items-center justify-center gap-2 hover:bg-red-100 transition-colors"><i data-lucide="trash-2" class="w-3 h-3"></i> Eliminar Cliente</button>
                            </div>
                        </div>
                    </div>
                </div>`; 
            }).join(''); 
            lucide.createIcons();
        }, 150),
        filter: () => { document.getElementById('listaClientesDrawer').innerHTML = Store.data.clients.filter(c => c.toUpperCase().includes(document.getElementById('searchCliente').value.toUpperCase())).sort().map(c => `<button onclick="Sales.selectClient('${c}')" class="w-full text-left p-4 bg-slate-50 rounded-2xl font-black uppercase text-[10px] mb-2 hover:bg-slate-100 flex justify-between items-center group"><span>${c}</span><i data-lucide="chevron-right" class="w-4 h-4 text-slate-300 group-hover:text-primary transition-colors"></i></button>`).join(''); lucide.createIcons(); },
        createManual: () => { const n = prompt("Nombre:"); if(n && n.length>2) { if(!Store.data.clients.includes(n.toUpperCase())) { Store.data.clients.push(n.toUpperCase()); Store.save(); Utils.toast("Cliente creado", "success"); Sales.selectClient(n.toUpperCase()); } else Sales.selectClient(n.toUpperCase()); } },
        delete: (name) => {
            if(confirm(`¿Estás seguro de ELIMINAR al cliente ${name}?`)) {
                Store.data.clients = Store.data.clients.filter(c => c !== name);
                Store.save();
                Clients.renderBase();
                Utils.toast("Cliente eliminado", "success");
            }
        }
    };

    const Sales = {
        state: { mode: 'efectivo', cliSel: null, catSel: null, subSelId: null },
        init: () => { document.getElementById('dVentaFecha').value = Utils.todayISO(); document.getElementById('dFechaFin').value = Utils.todayISO(); },
        setMode: (m) => { Sales.state.mode = m; ['efectivo', 'tarjeta', 'credito'].forEach(b => document.getElementById('btn-'+b).classList.remove('active-btn')); document.getElementById('btn-'+m).classList.add('active-btn'); document.getElementById('divFechaFin').classList.toggle('hidden', m !== 'credito'); },
        openClientDrawer: () => { document.getElementById('searchCliente').value = ''; Clients.filter(); App.openDrawer('drawerClientes'); setTimeout(()=>document.getElementById('searchCliente').focus(), 100); },
        selectClient: (c) => { Sales.state.cliSel = c; document.getElementById('btnSelectCliente').innerHTML = `<span class="truncate">${c}</span> <i data-lucide="check-circle" class="w-5 h-5 text-success"></i>`; document.getElementById('btnSelectCliente').classList.add('filled'); App.closeAll(); lucide.createIcons(); },
        openCatDrawer: () => { document.getElementById('drawerProductTitle').innerText = "Categoría"; document.getElementById('listaProductosDrawer').innerHTML = [...new Set(Store.data.inv.map(p => p.cat))].sort().map(c => `<button onclick="Sales.selectCat('${c}')" class="w-full text-left p-5 bg-slate-50 rounded-2xl font-black uppercase text-[10px] mb-2 hover:bg-slate-100 flex justify-between items-center group"><span>${c}</span><i data-lucide="folder" class="w-4 h-4 text-slate-300 group-hover:text-primary"></i></button>`).join(''); App.openDrawer('drawerProductos'); lucide.createIcons(); },
        selectCat: (c) => { Sales.state.catSel = c; document.getElementById('btnSelectCat').innerHTML = `<span class="text-primary truncate">${c}</span>`; document.getElementById('btnSelectCat').classList.add('filled'); Sales.openSubCatDrawer(); },
        openSubCatDrawer: () => { if(!Sales.state.catSel) return Utils.toast("Falta Categoría", "error"); document.getElementById('drawerProductTitle').innerText = Sales.state.catSel; document.getElementById('listaProductosDrawer').innerHTML = Store.data.inv.filter(p => p.cat === Sales.state.catSel).map(p => `<button onclick="Sales.selectSub('${p.id}', '${p.sub}')" class="w-full flex justify-between items-center p-4 bg-slate-50 rounded-2xl font-black uppercase text-[10px] mb-2 hover:bg-slate-100 ${p.s<=0?'opacity-50 grayscale':''}"><div class="text-left"><span class="block text-xs text-slate-800">${p.sub}</span><span class="${p.s<3?'text-danger':'text-slate-400'} text-[9px]">Stock: ${Utils.fNum(p.s)}</span></div><span class="text-primary bg-white px-3 py-2 rounded-xl shadow-sm">$${Utils.fNum(p.p)}</span></button>`).join(''); App.openDrawer('drawerProductos'); },
        selectSub: (id, name) => { Sales.state.subSelId = id; document.getElementById('btnSelectSubCat').innerHTML = `<span class="text-primary truncate">${name}</span>`; document.getElementById('btnSelectSubCat').classList.add('filled'); App.closeAll(); },
        resetSelection: () => { Sales.state.catSel = null; Sales.state.subSelId = null; document.getElementById('btnSelectCat').innerHTML = `<span class="truncate">CATEGORÍA</span>`; document.getElementById('btnSelectCat').classList.remove('filled'); document.getElementById('btnSelectSubCat').innerHTML = `<span class="truncate">VARIANTE</span>`; document.getElementById('btnSelectSubCat').classList.remove('filled'); Sales.openCatDrawer(); },
        adjustQty: (d) => { const e = document.getElementById('dCantidad'); let v = Utils.pNum(e.value) + d; if(v < 1) v = 1; e.value = v; },
        process: () => {
            if(!Sales.state.cliSel || !Sales.state.subSelId) return Utils.toast("Faltan datos", "error");
            const cant = Utils.pNum(document.getElementById('dCantidad').value), fv = document.getElementById('dVentaFecha').value, p = Store.data.inv.find(x => x.id == Sales.state.subSelId);
            if(p.s < cant) return Utils.toast("Sin stock", "error");
            p.s -= cant; const tot = cant * p.p;
            if(Sales.state.mode === 'credito') { Store.data.deu.push({ id: Date.now(), cli: Sales.state.cliSel, pr: `${p.cat}-${p.sub} (${cant})`, cant, tot, fv, ff: document.getElementById('dFechaFin').value, abono: 0 }); Utils.toast("Crédito registrado", "success"); }
            else { Store.data.hist.unshift({ cli: Sales.state.cliSel, det: `${cant}x ${p.cat} (${p.sub})`, tot, fv, tipo: Sales.state.mode, isPago: false }); if(Sales.state.mode === 'efectivo') Store.data.caja.ef += tot; else Store.data.caja.tj += tot; Utils.toast("Venta registrada", "success"); }
            Sales.state.subSelId = null; document.getElementById('btnSelectSubCat').innerHTML = '<span class="truncate">VARIANTE</span>'; document.getElementById('btnSelectSubCat').classList.remove('filled'); document.getElementById('dCantidad').value = '1';
            Store.save(); App.switchView('view-home');
        }
    };

    const App = {
        init: () => { Store.init(); lucide.createIcons(); },
        renderDashboard: () => {
            document.getElementById('stat-ganancia').innerText = '$' + Utils.fNum(Store.data.caja.ef + Store.data.caja.tj);
            document.getElementById('stat-efectivo').innerText = '$' + Utils.fNum(Store.data.caja.ef);
            document.getElementById('stat-tarjeta').innerText = '$' + Utils.fNum(Store.data.caja.tj);
            Finance.renderDebts();
            document.getElementById('list-ventas').innerHTML = Store.data.hist.slice(0, 15).map(v => `<div class="p-4 rounded-3xl bg-white border ${v.isPago ? 'border-emerald-100 bg-emerald-50/30' : 'border-slate-100'} flex justify-between items-center relative overflow-hidden">${v.isPago ? '<div class="absolute left-0 top-0 bottom-0 w-1 bg-success"></div>' : ''}<div class="flex-1 pr-4 leading-tight z-10"><p class="font-black uppercase text-slate-800 text-[10px]">${v.cli} <span class="text-slate-400 font-bold ml-1">(${Utils.fDate(v.fv)})</span></p><div class="flex items-center gap-2 mt-1"><span class="text-[8px] font-black uppercase tracking-wider px-1.5 py-0.5 rounded-md ${v.isPago ? 'bg-emerald-100 text-emerald-700' : 'bg-slate-100 text-slate-500'}">${v.tipo}</span><p class="text-slate-500 font-bold uppercase text-[9px] truncate w-40">${v.det}</p></div></div><p class="font-black ${v.isPago ? 'text-success' : 'text-slate-900'} text-sm z-10">$${Utils.fNum(v.tot)}</p></div>`).join('') || '<div class="text-center py-8"><p class="font-black text-[10px] uppercase opacity-30 tracking-widest">Sin movimientos hoy</p></div>';
        },
        switchView: (v) => { document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active')); document.getElementById(v).classList.add('active'); document.querySelectorAll('.nav-item').forEach(n => { n.classList.remove('text-primary'); n.classList.add('text-slate-300'); }); document.getElementById(v.replace('view-', 'nav-')).classList.add('text-primary'); if(v==='view-inventory') Inventory.render(); if(v==='view-clients') Clients.renderBase(); window.scrollTo(0,0); document.getElementById('headerTitle').innerText = {'view-home':'Resumen','view-inventory':'Inventario','view-clients':'Cartera','view-sales':'Terminal PV'}[v]; },
        openDrawer: (id) => { document.getElementById('modalOverlay').classList.add('active'); document.getElementById(id).classList.add('active'); },
        closeAll: () => { document.querySelectorAll('.drawer').forEach(d => d.classList.remove('active')); document.getElementById('modalOverlay').classList.remove('active'); }
    };
    
    window.addEventListener('DOMContentLoaded', App.init);
</script>
</body>
</html>
