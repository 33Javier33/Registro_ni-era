<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Hola Amigo!</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
            100% { transform: translateY(0px); }
        }
        .float-animation {
            animation: float 3s ease-in-out infinite;
        }
        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
    </style>
</head>
<body class="gradient-bg min-h-screen flex items-center justify-center p-4 font-sans text-white">

    <div class="max-w-md w-full bg-white/10 backdrop-blur-lg rounded-3xl p-8 shadow-2xl border border-white/20 text-center transform transition-all hover:scale-[1.02]">
        
        <!-- Icono decorativo -->
        <div class="mb-6 float-animation">
            <span class="text-7xl">👋</span>
        </div>

        <!-- Mensaje Principal -->
        <h1 id="greeting-title" class="text-4xl md:text-5xl font-bold mb-4 drop-shadow-md">
            ¡Hola, Amigo!
        </h1>

        <p class="text-lg md:text-xl text-indigo-100 mb-8 leading-relaxed">
            Espero que estés teniendo un día increíble. ¡Solo quería pasar por aquí para saludarte y sacarte una sonrisa!
        </p>

        <!-- Botón interactivo -->
        <button onclick="changeGreeting()" class="bg-white text-indigo-600 font-bold py-3 px-8 rounded-full shadow-lg hover:bg-indigo-50 transition-colors focus:outline-none focus:ring-4 focus:ring-indigo-300">
            ¡Dime algo más!
        </button>

        <!-- Decoración inferior -->
        <div class="mt-10 flex justify-center space-x-4">
            <span class="text-2xl opacity-75">✨</span>
            <span class="text-2xl opacity-75">🚀</span>
            <span class="text-2xl opacity-75">🌈</span>
        </div>
    </div>

    <script>
        const messages = [
            "¡Eres una persona genial!",
            "¡Que tengas un día productivo!",
            "¡Sigue brillando como siempre!",
            "¡Un abrazo a la distancia!",
            "¡Disfruta cada momento hoy!"
        ];

        let index = 0;

        function changeGreeting() {
            const title = document.getElementById('greeting-title');
            const button = event.target;
            
            // Animación simple de cambio
            title.style.opacity = '0';
            
            setTimeout(() => {
                title.innerText = messages[index];
                title.style.opacity = '1';
                index = (index + 1) % messages.length;
            }, 200);

            // Efecto visual en el botón
            button.innerText = "¡Genial! ⚡";
            setTimeout(() => {
                button.innerText = "¡Dime algo más!";
            }, 1000);
        }

        // Si quieres personalizar el nombre por la URL (ej: index.html?nombre=Juan)
        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            const nombre = params.get('nombre');
            if (nombre) {
                document.getElementById('greeting-title').innerText = `¡Hola, ${nombre}!`;
            }
        };
    </script>
</body>
</html>
