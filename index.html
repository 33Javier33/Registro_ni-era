<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
    <meta name="theme-color" content="#2563eb">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>AccounTech Pro - V2</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
          theme: {
            extend: {
              fontFamily: { sans: ['Inter', 'sans-serif'] },
              colors: { primary: '#2563eb', success: '#16a34a', danger: '#dc2626', dark: '#0f172a' }
            }
          }
        }
    </script>
    <style>
        body { background-color: #f8fafc; -webkit-tap-highlight-color: transparent; scroll-behavior: smooth; user-select: none; }
        .view-section { display: none; opacity: 0; transition: opacity 0.2s ease-in; }
        .view-section.active { display: block; opacity: 1; }
        
        /* Botones y Estados */
        .active-btn { border-color: #2563eb !important; background-color: #eff6ff !important; color: #2563eb !important; border-width: 2px !important; box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.1); }
        ::-webkit-scrollbar { display: none; }
        input, select { font-size: 16px !important; outline: none !important; } 
        input:focus { border-color: #2563eb !important; ring: 0 !important; }

        /* Drawers y Modales */
        .drawer { transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1); transform: translateY(110%); max-height: 92vh; display: flex; flex-direction: column; }
        .drawer.active { transform: translateY(0); }
        .drawer-content { overflow-y: auto; flex: 1; padding-bottom: 40px; -webkit-overflow-scrolling: touch; }
        .overlay { transition: opacity 0.3s ease; opacity: 0; pointer-events: none; backdrop-filter: blur(4px); }
        .overlay.active { opacity: 1; pointer-events: auto; }
        
        /* Acordeón */
        .acc-content { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out; }
        .acc-card.open .acc-content { max-height: 1000px; }
        .acc-card.open .chevron-icon { transform: rotate(180deg); }
        .chevron-icon { transition: transform 0.3s ease; }

        /* Componentes UI */
        .custom-select-btn { border: 1px solid #e2e8f0; border-radius: 1rem; padding: 1rem 1.25rem; width: 100%; display: flex; justify-content: space-between; align-items: center; background: white; font-weight: 800; text-transform: uppercase; font-size: 0.75rem; height: 3.5rem; transition: all 0.2s; }
        .custom-select-btn:active { transform: scale(0.98); background-color: #f1f5f9; }
        .custom-select-btn.filled { border-color: #2563eb; color: #2563eb; background-color: #eff6ff; }
        
        .fab { position: fixed; bottom: 110px; right: 20px; z-index: 40; width: 56px; height: 56px; border-radius: 18px; background-color: #0f172a; color: white; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 25px -5px rgba(15, 23, 42, 0.5); border: none; transition: transform 0.2s; }
        .fab:active { transform: scale(0.90); }

        /* Toast Notification */
        #toast-container { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 200; display: flex; flex-direction: column; gap: 10px; pointer-events: none; width: 90%; max-width: 400px; }
        .toast { background: rgba(15, 23, 42, 0.95); color: white; padding: 12px 20px; border-radius: 50px; font-size: 12px; font-weight: 700; text-transform: uppercase; text-align: center; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); opacity: 0; transform: translateY(-20px); transition: all 0.3s cubic-bezier(0.68, -0.55, 0.27, 1.55); pointer-events: auto; backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; gap: 8px; }
        .toast.show { opacity: 1; transform: translateY(0); }
        .toast.error { background: rgba(220, 38, 38, 0.95); }
        .toast.success { background: rgba(22, 163, 74, 0.95); }
    </style>
</head>
<body class="font-sans text-slate-900 pb-32 selection:bg-primary selection:text-white">

<!-- Sistema de Notificaciones -->
<div id="toast-container"></div>

<!-- Overlay General -->
<div id="modalOverlay" class="overlay fixed inset-0 z-[100] bg-slate-900/60" onclick="App.closeAll()"></div>

<!-- FORMULARIO STOCK -->
<div id="drawerInvForm" class="drawer fixed bottom-0 left-0 right-0 z-[101] bg-white rounded-t-[2.5rem] shadow-2xl">
    <div class="w-full pt-4 pb-2" onclick="App.closeAll()"><div class="w-12 h-1.5 bg-slate-200 rounded-full mx-auto"></div></div>
    <div class="px-8 pb-4 flex justify-between items-center">
        <h3 class="font-black text-xl uppercase tracking-tight text-slate-800" id="inv-form-title">Stock</h3>
        <button onclick="App.closeAll()" class="p-2 bg-slate-100 rounded-full text-slate-400 hover:bg-slate-200"><i data-lucide="x" class="w-5 h-5"></i></button>
    </div>
    <div class="drawer-content px-8">
        <div class="space-y-4 pt-2">
            <input type="hidden" id="editId">
            <input type="text" id="pNombre" list="catsListInv" placeholder="NOMBRE CATEGORÍA" class="w-full rounded-2xl border-slate-100 bg-slate-50 h-14 uppercase font-black px-5 focus:bg-white transition-colors" autocomplete="off">
            <datalist id="catsListInv"></datalist>
            <input type="text" id="pSubNombre" placeholder="VARIANTE / MODELO" class="w-full rounded-2xl border-slate-100 bg-slate-50 h-14 uppercase font-black px-5 focus:bg-white transition-colors" autocomplete="off">
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="text-[9px] font-black ml-2 text-slate-400 uppercase">Cantidad</label>
                    <input type="tel" id="pStock" placeholder="0" class="w-full rounded-2xl border-slate-100 bg-slate-50 h-14 text-center font-black text-lg focus:bg-white" oninput="Utils.formatInput(this)">
                </div>
                <div>
                    <label class="text-[9px] font-black ml-2 text-slate-400 uppercase">Precio</label>
                    <input type="tel" id="pPrecio" placeholder="$0" class="w-full rounded-2xl border-slate-100 bg-slate-50 h-14 text-center font-black text-lg text-primary focus:bg-white" oninput="Utils.formatInput(this)">
                </div>
            </div>
            <button onclick="Inventory.save()" class="w-full bg-slate-900 text-white py-5 rounded-[1.5rem] font-black uppercase text-xs tracking-widest hover:bg-slate-800 active:scale-[0.98] transition-all mt-4">Guardar Registro</button>
        </div>
    </div>
</div>

<!-- MODAL ABONO -->
<div id="modalAbono" class="drawer fixed bottom-0 left-0 right-0 z-[101] bg-white rounded-t-[2.5rem] p-8 shadow-2xl">
    <div class="w-12 h-1.5 bg-slate-200 rounded-full mx-auto mb-6"></div>
    <h3 class="font-black text-xl text-center uppercase tracking-tight mb-1">Registrar Pago</h3>
    <p id="modalNombre" class="font-black text-primary uppercase text-center text-sm mb-6"></p>
    <div class="space-y-6 text-center">
        <div class="relative">
            <span class="absolute left-1/2 -translate-x-[200%] top-1/2 -translate-y-1/2 text-slate-300 font-black text-3xl">$</span>
            <input type="tel" id="modalMonto" placeholder="0" class="w-full border-none bg-transparent h-20 text-center font-black text-6xl focus:ring-0 text-slate-800 placeholder:text-slate-200" oninput="Utils.formatInput(this)">
        </div>
        <p id="modalSaldo" class="text-xs font-bold text-danger uppercase bg-red-50 py-2 px-4 rounded-full inline-block"></p>
        <div class="grid grid-cols-2 gap-3">
            <button onclick="Finance.setMethod('efectivo')" id="m-efectivo" class="py-4 rounded-2xl border-2 border-slate-100 font-black text-[10px] uppercase transition-all">Efectivo</button>
            <button onclick="Finance.setMethod('tarjeta')" id="m-tarjeta" class="py-4 rounded-2xl border-2 border-slate-100 font-black text-[10px] uppercase transition-all">Tarjeta</button>
        </div>
        <button onclick="Finance.confirmPayment()" class="w-full bg-success text-white py-5 rounded-[2rem] font-black uppercase tracking-widest shadow-xl shadow-green-200 active:scale-[0.98] transition-transform">Confirmar Pago</button>
    </div>
</div>

<!-- DRAWER CLIENTES -->
<div id="drawerClientes" class="drawer fixed bottom-0 left-0 right-0 z-[101] bg-white rounded-t-[2.5rem] p-6 shadow-2xl">
    <div class="w-full pt-2 pb-4"><div class="w-12 h-1.5 bg-slate-200 rounded-full mx-auto"></div></div>
    <div class="relative mb-4">
        <i data-lucide="search" class="absolute left-5 top-4 w-5 h-5 text-slate-300"></i>
        <input type="text" id="searchCliente" placeholder="Buscar Cliente..." class="w-full rounded-2xl border-slate-100 bg-slate-50 h-14 font-bold pl-12 pr-5 uppercase text-sm focus:bg-white" oninput="Clients.filter()">
    </div>
    <div id="listaClientesDrawer" class="space-y-2 overflow-y-auto max-h-[60vh]"></div>
    <button onclick="Clients.createManual()" class="w-full mt-4 p-4 border-2 border-dashed border-slate-200 rounded-2xl text-slate-400 font-black uppercase text-[10px] tracking-widest hover:border-primary hover:text-primary transition-colors">+ Crear Nuevo Cliente</button>
</div>

<!-- DRAWER PRODUCTOS -->
<div id="drawerProductos" class="drawer fixed bottom-0 left-0 right-0 z-[101] bg-white rounded-t-[2.5rem] p-6 shadow-2xl">
    <div class="w-full pt-2 pb-4"><div class="w-12 h-1.5 bg-slate-200 rounded-full mx-auto"></div></div>
    <div class="flex justify-between items-center mb-4 px-2">
         <h3 class="font-black text-lg uppercase tracking-tight" id="drawerProductTitle">Seleccionar</h3>
         <button onclick="if(Sales.state.catSel && !Sales.state.subSelId) Sales.resetSelection(); else App.closeAll()" class="text-xs font-bold text-slate-400 uppercase">Atrás</button>
    </div>
    <div id="listaProductosDrawer" class="space-y-2 overflow-y-auto max-h-[60vh]"></div>
</div>

<!-- HEADER -->
<header class="bg-white/90 backdrop-blur-md px-6 py-5 sticky top-0 z-50 border-b border-slate-100 text-center">
    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em] mb-1">AccounTech Pro</p>
    <h1 class="text-xl font-black text-slate-900 uppercase tracking-tighter" id="headerTitle">Resumen</h1>
</header>

<!-- MAIN CONTENT -->
<main class="px-4 mt-6 space-y-8 pb-10 min-h-screen">
    
    <!-- VISTA INICIO -->
    <section id="view-home" class="view-section active space-y-8">
        <!-- Tarjeta Resumen -->
        <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100 text-center relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-primary to-cyan-400"></div>
            <p class="text-[10px] font-black text-slate-400 uppercase mb-2 tracking-widest">Caja Total Hoy</p>
            <h2 class="text-5xl font-black text-slate-900 tracking-tight" id="stat-ganancia">$0</h2>
            <div class="flex gap-4 mt-6 pt-5 border-t border-slate-50 text-[10px] font-black uppercase text-slate-500">
                <div class="flex-1 flex flex-col items-center">
                    <span class="mb-1 text-slate-300">Efectivo</span>
                    <span class="text-success text-base" id="stat-efectivo">$0</span>
                </div>
                <div class="flex-1 flex flex-col items-center border-l border-slate-50">
                    <span class="mb-1 text-slate-300">Tarjeta</span>
                    <span class="text-primary text-base" id="stat-tarjeta">$0</span>
                </div>
            </div>
        </div>

        <!-- Deudores -->
        <div class="space-y-4">
            <h3 class="font-black text-slate-800 px-2 uppercase text-[10px] flex justify-between tracking-widest items-center">
                <span>⚠️ CUENTAS PENDIENTES</span>
                <span class="bg-red-50 text-danger px-2 py-1 rounded-md" id="stat-deuda">$0</span>
            </h3>
            <div id="list-deudores" class="space-y-4"></div>
        </div>

        <!-- Historial -->
        <div class="space-y-4">
            <h3 class="font-black text-slate-800 px-2 uppercase text-[10px] tracking-widest text-center">📜 MOVIMIENTOS RECIENTES</h3>
            <div id="list-ventas" class="space-y-3"></div>
        </div>
    </section>

    <!-- VISTA INVENTARIO -->
    <section id="view-inventory" class="view-section space-y-6">
        <div class="grid grid-cols-2 gap-3 text-center">
            <div class="bg-slate-900 p-5 rounded-3xl text-white shadow-lg shadow-slate-200">
                <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1">Valor Stock</p>
                <h4 class="text-lg font-black" id="inv-total-valor">$0</h4>
            </div>
            <div class="bg-white p-5 rounded-3xl border border-slate-100 shadow-sm">
                <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1">Unidades</p>
                <h4 class="text-lg font-black" id="inv-total-unidades">0</h4>
            </div>
        </div>
        <div class="relative">
            <i data-lucide="search" class="absolute left-5 top-4 w-5 h-5 text-slate-300"></i>
            <input type="text" id="invSearch" placeholder="Buscar producto..." class="w-full rounded-2xl border-none bg-white h-14 font-bold shadow-sm pl-12 pr-5 text-sm" oninput="Inventory.render()">
        </div>
        <div id="tabla-inventario" class="space-y-4 pb-20"></div>
        <button onclick="Inventory.openForm()" class="fab shadow-xl"><i data-lucide="plus" class="w-8 h-8"></i></button>
    </section>

    <!-- VISTA CLIENTES -->
    <section id="view-clients" class="view-section space-y-6">
        <div class="relative">
            <i data-lucide="search" class="absolute left-5 top-4 w-5 h-5 text-slate-300"></i>
            <input type="text" id="clientSearch" placeholder="Buscar en historial..." class="w-full rounded-2xl border-none bg-white h-14 font-bold shadow-sm pl-12 pr-5 text-sm" oninput="Clients.renderBase()">
        </div>
        <div id="lista-base-clientes" class="space-y-4 pb-20"></div>
    </section>

    <!-- VISTA VENTAS -->
    <section id="view-sales" class="view-section space-y-6">
        <div class="bg-white p-6 rounded-[2.5rem] border border-slate-100 shadow-sm relative">
            <div class="absolute -top-3 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-4 py-1 rounded-full text-[10px] font-black uppercase tracking-widest">Nueva Venta</div>
            
            <div class="space-y-6 mt-4">
                <!-- Método Pago -->
                <div class="grid grid-cols-3 gap-2 bg-slate-50 p-1.5 rounded-2xl border border-slate-100">
                    <button onclick="Sales.setMode('efectivo')" id="btn-efectivo" class="py-3 rounded-xl text-[9px] font-black uppercase active-btn transition-all">EFECTIVO</button>
                    <button onclick="Sales.setMode('tarjeta')" id="btn-tarjeta" class="py-3 rounded-xl text-[9px] font-black uppercase transition-all">TARJETA</button>
                    <button onclick="Sales.setMode('credito')" id="btn-credito" class="py-3 rounded-xl text-[9px] font-black uppercase text-danger transition-all">DEUDA</button>
                </div>

                <!-- Formulario -->
                <div class="space-y-4">
                    <button onclick="Sales.openClientDrawer()" id="btnSelectCliente" class="custom-select-btn shadow-sm group">
                        <span class="text-slate-400 group-[.filled]:text-primary">SELECCIONAR CLIENTE</span> 
                        <i data-lucide="user" class="w-4 h-4 opacity-30"></i>
                    </button>
                    
                    <div class="grid grid-cols-1 gap-3 transition-all" id="date-container">
                        <div class="relative">
                             <span class="absolute left-4 top-1/2 -translate-y-1/2 text-[9px] font-black text-slate-400">FECHA</span>
                             <input type="date" id="dVentaFecha" class="w-full rounded-2xl border-slate-100 bg-slate-50 h-14 text-xs font-black pl-16 pr-5 text-right outline-none">
                        </div>
                        <div class="relative hidden" id="divFechaFin">
                            <span class="absolute left-4 top-1/2 -translate-y-1/2 text-[9px] font-black text-red-300">COBRO</span>
                            <input type="date" id="dFechaFin" class="w-full rounded-2xl border-red-100 bg-red-50 h-14 text-xs font-black text-danger pl-16 pr-5 text-right outline-none">
                        </div>
                    </div>

                    <div class="flex gap-2">
                        <button onclick="Sales.openCatDrawer()" id="btnSelectCat" class="custom-select-btn shadow-sm flex-1"><span class="truncate">CATEGORÍA</span></button>
                        <button onclick="Sales.openSubCatDrawer()" id="btnSelectSubCat" class="custom-select-btn shadow-sm flex-1"><span class="truncate">VARIANTE</span></button>
                    </div>

                    <div class="text-center bg-slate-50 rounded-3xl py-4 border border-dashed border-slate-200">
                        <label class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Cantidad</label>
                        <div class="flex items-center justify-center gap-4 mt-2">
                             <button onclick="Sales.adjustQty(-1)" class="w-10 h-10 rounded-full bg-white shadow-sm flex items-center justify-center text-slate-400 active:scale-90 transition-transform"><i data-lucide="minus" class="w-4 h-4"></i></button>
                             <input type="tel" id="dCantidad" value="1" class="w-24 border-none bg-transparent text-center font-black text-5xl p-0 focus:ring-0" oninput="Utils.formatInput(this)">
                             <button onclick="Sales.adjustQty(1)" class="w-10 h-10 rounded-full bg-white shadow-sm flex items-center justify-center text-primary active:scale-90 transition-transform"><i data-lucide="plus" class="w-4 h-4"></i></button>
                        </div>
                    </div>
                </div>

                <button onclick="Sales.process()" class="w-full bg-slate-900 text-white py-6 rounded-[2rem] font-black uppercase tracking-widest shadow-xl shadow-slate-300 active:scale-[0.98] transition-transform">Finalizar Venta</button>
            </div>
        </div>
    </section>
</main>

<!-- NAVBAR -->
<nav class="fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-lg border-t border-slate-100 px-6 py-5 flex justify-between items-center z-50 rounded-t-[2.5rem] shadow-[0_-10px_40px_-15px_rgba(0,0,0,0.1)]">
    <button onclick="App.switchView('view-home')" class="nav-item flex flex-col items-center space-y-1.5 text-primary transition-colors" id="nav-home">
        <i data-lucide="layout-grid" class="w-6 h-6"></i><span class="text-[9px] font-black uppercase tracking-wide">Inicio</span>
    </button>
    <button onclick="App.switchView('view-inventory')" class="nav-item flex flex-col items-center space-y-1.5 text-slate-300 hover:text-slate-500 transition-colors" id="nav-inventory">
        <i data-lucide="box" class="w-6 h-6"></i><span class="text-[9px] font-black uppercase tracking-wide">Stock</span>
    </button>
    <button onclick="App.switchView('view-clients')" class="nav-item flex flex-col items-center space-y-1.5 text-slate-300 hover:text-slate-500 transition-colors" id="nav-clients">
        <i data-lucide="users" class="w-6 h-6"></i><span class="text-[9px] font-black uppercase tracking-wide">Clientes</span>
    </button>
    <button onclick="App.switchView('view-sales')" class="nav-item flex flex-col items-center space-y-1.5 text-slate-300 hover:text-slate-500 transition-colors" id="nav-sales">
        <i data-lucide="plus-circle" class="w-6 h-6"></i><span class="text-[9px] font-black uppercase tracking-wide">Vender</span>
    </button>
</nav>

<script>
    /**
     * AccounTech Pro - Core System v2.0
     * Estructura modular para mejor mantenimiento y rendimiento.
     */

    // --- UTILIDADES ---
    const Utils = {
        pNum: (s) => parseInt(s.toString().replace(/\./g, '')) || 0,
        fNum: (n) => new Intl.NumberFormat('de-DE').format(n),
        fDate: (iso) => {
            if(!iso) return '';
            const [y, m, d] = iso.split('-');
            return `${d}/${m}/${y}`; // Formato visual local
        },
        todayISO: () => new Date().toLocaleDateString('en-CA'), // YYYY-MM-DD local
        formatInput: (input) => {
            let val = input.value.replace(/\D/g, "");
            if (val === "") { input.value = ""; return; }
            input.value = new Intl.NumberFormat('de-DE').format(parseInt(val));
        },
        debounce: (func, wait) => {
            let timeout;
            return function executedFunction(...args) {
                const later = () => { clearTimeout(timeout); func(...args); };
                clearTimeout(timeout);
                timeout = setTimeout(later, wait);
            };
        },
        toast: (msg, type = 'default') => {
            const c = document.getElementById('toast-container');
            const el = document.createElement('div');
            el.className = `toast ${type}`;
            // Iconos según tipo
            let icon = type === 'success' ? 'check-circle' : (type === 'error' ? 'alert-circle' : 'info');
            el.innerHTML = `<i data-lucide="${icon}" class="w-4 h-4"></i> <span>${msg}</span>`;
            c.appendChild(el);
            lucide.createIcons();
            // Animación
            requestAnimationFrame(() => el.classList.add('show'));
            setTimeout(() => {
                el.classList.remove('show');
                setTimeout(() => el.remove(), 300);
            }, 3000);
        },
        scrollTo: (el) => {
            setTimeout(() => el.scrollIntoView({ behavior: 'smooth', block: 'center' }), 300);
        }
    };

    // --- DATOS (STORE) ---
    const Store = {
        key: 'v39', // Mantenemos v39 para compatibilidad con tus datos
        data: {
            inv: [], deu: [], hist: [], caja: { ef: 0, tj: 0 }, clients: []
        },
        load: () => {
            Store.data.inv = JSON.parse(localStorage.getItem(`${Store.key}_inv`)) || [];
            Store.data.deu = JSON.parse(localStorage.getItem(`${Store.key}_deu`)) || [];
            Store.data.hist = JSON.parse(localStorage.getItem(`${Store.key}_hist`)) || [];
            Store.data.caja = JSON.parse(localStorage.getItem(`${Store.key}_caja`)) || { ef: 0, tj: 0 };
            Store.data.clients = JSON.parse(localStorage.getItem(`${Store.key}_clientes`)) || [];
        },
        save: () => {
            localStorage.setItem(`${Store.key}_inv`, JSON.stringify(Store.data.inv));
            localStorage.setItem(`${Store.key}_deu`, JSON.stringify(Store.data.deu));
            localStorage.setItem(`${Store.key}_hist`, JSON.stringify(Store.data.hist));
            localStorage.setItem(`${Store.key}_caja`, JSON.stringify(Store.data.caja));
            localStorage.setItem(`${Store.key}_clientes`, JSON.stringify(Store.data.clients));
            App.renderDashboard(); // Actualizar dashboard siempre al guardar
        }
    };

    // --- LÓGICA DE NEGOCIO ---

    // 1. INVENTARIO
    const Inventory = {
        render: Utils.debounce(() => {
            const q = document.getElementById('invSearch').value.toUpperCase();
            const list = document.getElementById('tabla-inventario');
            const grouped = Store.data.inv.reduce((acc, p) => { 
                if (!acc[p.cat]) acc[p.cat] = []; 
                acc[p.cat].push(p); return acc; 
            }, {});

            let html = Object.keys(grouped).map(cat => {
                const items = grouped[cat].filter(p => p.sub.includes(q) || cat.includes(q));
                if (items.length === 0) return '';

    // 2. FINANZAS Y DEUDAS

        renderDebts: () => {
            const gDeu = Store.data.deu.reduce((acc, d) => {
                if (!acc[d.cli]) acc[d.cli] = { items: [], saldo: 0, latest: d.ff };
                const pendiente = d.tot - d.abono;
                if(pendiente > 0) {
                    acc[d.cli].items.push(d);
                    acc[d.cli].saldo += pendiente;
                }
                return acc;
            }, {});

            const list = document.getElementById('list-deudores');
            const names = Object.keys(gDeu).filter(n => gDeu[n].saldo > 0);

            if (names.length === 0) {
                document.getElementById('stat-deuda').innerText = '$0';
                list.innerHTML = '<div class="text-center py-8 bg-white rounded-[2rem] border border-slate-100 border-dashed"><p class="font-black text-[10px] uppercase opacity-40">Sin deudas pendientes</p></div>';
                return;
            }

            const totalGlobal = names.reduce((a, n) => a + gDeu[n].saldo, 0);
            document.getElementById('stat-deuda').innerText = '$' + Utils.fNum(totalGlobal);

            list.innerHTML = names.map(nom => {
                const data = gDeu[nom];
                // Mostramos max 3 items en el resumen
                const resumenItems = data.items.slice(0,3).map(d => `<div class="flex justify-between text-[9px] text-slate-500"><span>• ${d.pr}</span><span>$${Utils.fNum(d.tot - d.abono)}</span></div>`).join('');
                const extra = data.items.length > 3 ? `<p class="text-[8px] text-slate-400 mt-1 italic">+${data.items.length - 3} más...</p>` : '';

                return `
                <div class="p-6 bg-white rounded-[2rem] border border-slate-100 shadow-sm relative overflow-hidden">
                    <div class="flex justify-between items-start mb-3">
                        <p class="font-black text-sm uppercase text-slate-800">${nom}</p>
                        <p class="font-black text-lg text-danger">$${Utils.fNum(data.saldo)}</p>
                    </div>
                    <div class="bg-slate-50 p-3 rounded-xl mb-4 space-y-1 border border-slate-100/50">
                        ${resumenItems}
                        ${extra}
                    </div>
                    <button onclick="Finance.openPaymentModal('${nom}')" class="w-full bg-slate-900 text-white text-[10px] font-black py-4 rounded-xl uppercase tracking-widest active:scale-[0.98] transition-all hover:bg-slate-800 flex justify-center gap-2">
                        <span>Registrar Abono</span> <i data-lucide="arrow-right" class="w-3 h-3"></i>
                    </button>
                </div>`;
            }).join('');
            lucide.createIcons();
        },

        openPaymentModal: (nom) => {
            Finance.clientName = nom;
            // Calcular saldo real actual
            const saldo = Store.data.deu.filter(d => d.cli === nom).reduce((a,b) => a + (b.tot - b.abono), 0);
            
            document.getElementById('modalNombre').innerText = nom;
            document.getElementById('modalSaldo').innerText = `Saldo Pendiente: $${Utils.fNum(saldo)}`;
            document.getElementById('modalMonto').value = '';
            Finance.setMethod('efectivo');
            App.openDrawer('modalAbono');
            setTimeout(() => document.getElementById('modalMonto').focus(), 100);
        },

        setMethod: (m) => {
            Finance.method = m;
            document.getElementById('m-efectivo').className = `py-4 rounded-2xl border-2 font-black text-[10px] uppercase transition-all ${m === 'efectivo' ? 'active-btn' : 'border-slate-100 text-slate-400'}`;
            document.getElementById('m-tarjeta').className = `py-4 rounded-2xl border-2 font-black text-[10px] uppercase transition-all ${m === 'tarjeta' ? 'active-btn' : 'border-slate-100 text-slate-400'}`;
        },

        confirmPayment: () => {
            const m = Utils.pNum(document.getElementById('modalMonto').value);
            if(m <= 0) return Utils.toast("Monto inválido", "error");

            // Algoritmo FIFO (First In, First Out)
            // Ordenar deudas por fecha de vencimiento (o creación)
            let userDebts = Store.data.deu
                .filter(d => d.cli === Finance.clientName && (d.tot - d.abono) > 0)
                .sort((a,b) => new Date(a.fv) - new Date(b.fv));

            if(userDebts.length === 0) return Utils.toast("Este cliente no tiene deuda", "success");

            let remanente = m;
            let paidItems = [];

            for(let debt of userDebts) {
                if(remanente <= 0) break;
                
                let pendiente = debt.tot - debt.abono;
                let pagar = Math.min(remanente, pendiente);
                
                // Actualizar deuda en el store (referencia directa)
                debt.abono += pagar;
                remanente -= pagar;
                
                paidItems.push(debt.pr);
            }

            // Actualizar Caja
            if(Finance.method === 'efectivo') Store.data.caja.ef += m;
            else Store.data.caja.tj += m;

            // Historial
            Store.data.hist.unshift({
                cli: Finance.clientName,
                det: `Pago Cta: ${paidItems.length > 1 ? 'Varios Items' : paidItems[0]}`,
                tot: m,
                fv: Utils.todayISO(),
                tipo: Finance.method,
                isPago: true
            });

            // Limpieza de deudas pagadas totalmente (opcional, aqui las dejo pero marcadas como pagadas)
            // Store.data.deu = Store.data.deu.filter(d => (d.tot - d.abono) > 0); 
            // Preferible mantener registro histórico de la deuda saldada para auditoría, no borrar.
            
            Store.save();
            Utils.toast(`Abono de $${Utils.fNum(m)} registrado`, "success");
            App.closeAll();
        }
    };

        adjustQty: (delta) => {
            const el = document.getElementById('dCantidad');
            let v = Utils.pNum(el.value) + delta;
            if(v < 1) v = 1;
            el.value = v;
        },

        process: () => {
            // Validaciones
            if(!Sales.state.cliSel) return Utils.toast("Seleccione un Cliente", "error");
            if(!Sales.state.subSelId) return Utils.toast("Seleccione un Producto", "error");

            const cant = Utils.pNum(document.getElementById('dCantidad').value);
            const fechaVenta = document.getElementById('dVentaFecha').value;
            const producto = Store.data.inv.find(x => x.id == Sales.state.subSelId);

            if(!producto) return Utils.toast("Producto no encontrado", "error");
            if(cant <= 0) return Utils.toast("Cantidad inválida", "error");
            
            // Validar Stock
            if(producto.s < cant) return Utils.toast(`Stock insuficiente (Max: ${producto.s})`, "error");

            const total = cant * producto.p;

            // Procesar
            producto.s -= cant; // Descontar stock

            if(Sales.state.mode === 'credito') {
                const fechaCobro = document.getElementById('dFechaFin').value;
                if(!fechaCobro) return Utils.toast("Indique fecha de cobro", "error");

                Store.data.deu.push({
                    id: Date.now(),
                    cli: Sales.state.cliSel,
                    pr: `${producto.cat} - ${producto.sub} (${cant}u)`,
                    cant: cant,
                    tot: total,
                    fv: fechaVenta,
                    ff: fechaCobro,
                    abono: 0
                });
                Utils.toast("Venta a crédito registrada", "success");
            } else {
                Store.data.hist.unshift({
                    cli: Sales.state.cliSel,
                    det: `${cant}x ${producto.cat} (${producto.sub})`,
                    tot: total,
                    fv: fechaVenta,
                    tipo: Sales.state.mode,
                    isPago: false
                });

                if(Sales.state.mode === 'efectivo') Store.data.caja.ef += total;
                else Store.data.caja.tj += total;
                
                Utils.toast(`Venta registrada: $${Utils.fNum(total)}`, "success");
            }

            // Reset UI
            Sales.state.subSelId = null;
            document.getElementById('btnSelectSubCat').innerHTML = '<span class="truncate">VARIANTE</span>';
            document.getElementById('btnSelectSubCat').classList.remove('filled');
            document.getElementById('dCantidad').value = '1';
            
            Store.save();
            App.switchView('view-home');
        }
    };

                n.classList.add('text-slate-300');
            });
            document.getElementById(viewId.replace('view-', 'nav-')).classList.remove('text-slate-300');
            document.getElementById(viewId.replace('view-', 'nav-')).classList.add('text-primary');

            // Header Title Update
            const titles = { 'view-home': 'Resumen', 'view-inventory': 'Inventario', 'view-clients': 'Cartera', 'view-sales': 'Terminal Punto Venta' };
            document.getElementById('headerTitle').innerText = titles[viewId];

            // Specific Renders (Lazy Loading)
            if(viewId === 'view-inventory') Inventory.render();
            if(viewId === 'view-clients') Clients.renderBase();
            
            window.scrollTo(0,0);
        },

        openDrawer: (id) => {
            document.getElementById('modalOverlay').classList.add('active');
            document.getElementById(id).classList.add('active');
        },

        closeAll: () => {
            document.querySelectorAll('.drawer').forEach(d => d.classList.remove('active'));
            document.getElementById('modalOverlay').classList.remove('active');
        }
    };

    // Start App
    window.addEventListener('DOMContentLoaded', () => {
        App.init();
        lucide.createIcons();
    });

</script>
</body>
</html>
